# Canonical descriptor for the tack plugin ‚Äî edit here, never plugin.json.
# Projects into .claude-plugin/plugin.json (via scripts/gen-plugin-json.py) and
# the marketplace SPA (the suite: block).

name: tack
version: 0.27.0
description: Route tracker for AI-assisted development work ‚Äî pivots, deliverables, and dependencies ‚Äî across session boundaries
author: chris-peterson
repository: https://github.com/chris-peterson/tack
icon: assets/icon.svg
license: MIT
keywords: [tack, routes, wip, session, ai, development, tracking, deliverables, dependencies]

# ‚Üí marketplace.json entry
marketplace:
  category: productivity
  homepage: https://chris-peterson.github.io/tack/#/

# ‚Üí marketplace SPA; keys mirror the SPA's PLUGINS object.
suite:
  cli: true
  group: bearings
  gloss: To tack is to change course; tack remembers every course you've held.
  pitch: "Keep losing your place between sessions? It remembers what you were doing so you don't re-explain it every time."
  what: "Tracks what you're working on ‚Äî across crashes, context overflow, or jumping between projects. Start a fresh session and pick up exactly where you left off."
  cmds:
    - ["/tack:tack", "Resume ‚Äî what you were doing, and where you stopped"]
    - ["tack", "Track routes, tasks, and deliverables from any terminal"]
  # Skill-anchored previews of the flagship flows, shown live on the docs site;
  # the session: below is the at-a-glance flow the hub also reads.
  # >>> shipyard:describe ‚Äî generated from source by `shipyard gen-describe`; do not edit >>>
  describe:
    skills:
      tack: Track AI-assisted development work with the `tack` route tracker, spanning session boundaries.
    hooks:
      capture-urls: PostToolUse ‚Äî Detects PR/MR/issue URLs in Bash tool output and nudges the agent to ensure a tack route mapping exists for each.
      cli-freshness: SessionStart ‚Äî Detects when the installed tack CLI wrapper is stale relative to the plugin version and nudges to refresh it.
      hooks: 'Hook wiring: SessionStart‚Üícli-freshness; UserPromptSubmit‚Üísession-nudge; PostToolUse‚Üícapture-urls.'
      session-nudge: UserPromptSubmit ‚Äî Detects untracked PR/MR/issue URLs in user messages and, on the first prompt of a session, resolves and records the session's tack route.
  # <<< shipyard:describe <<<
  examples:
    - label: "/tack:tack"
      ac: "--orient"
      frames:
        - { t: you, text: "/tack:tack" }
        - { t: claude, text: "Picking up the pinned route: auth-rewrite. 3 of 5 tacks done ‚Äî next is the client SDK, and t4 is blocked on the middleware PR." }
        - { t: status, text: "resolves the active route and replays where you left off" }
    - label: "record a deliverable"
      ac: "--green"
      frames:
        - { t: you, text: "opened the PR: github.com/org/api-server/pull/42" }
        - { t: claude, text: "That's the session-middleware tack on auth-rewrite. I'll attach it as the deliverable so the route remembers what shipped." }
        - { t: status, text: "records api-server#42 against the in-progress tack" }
  session:
    - { t: note, text: "Mid-refactor across two repos; the context window is filling up." }
    - { t: event, text: "a fresh session, next morning" }
    - { t: cmd, cmd: "/tack:tack", out: "Replays the route ‚Äî 3 of 5 tasks done, next is the client SDK." }
