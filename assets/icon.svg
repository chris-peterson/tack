<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32" role="img" aria-label="tack">
  <defs>
    <linearGradient id="beat" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#bd93f9"/>
      <stop offset="55%" stop-color="#8be9fd"/>
      <stop offset="100%" stop-color="#50fa7b"/>
    </linearGradient>
  </defs>

  <!-- Tacking beat: zigzag against the wind, up to the destination -->
  <path d="M 5 27 L 13 20 L 9 13 L 19 10 L 15 5 L 27 6"
        fill="none" stroke="url(#beat)" stroke-width="2.6"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Origin -->
  <circle cx="5" cy="27" r="2.6" fill="#bd93f9"/>

  <!-- Destination -->
  <circle cx="27" cy="6" r="2.6" fill="#50fa7b"/>
</svg>
