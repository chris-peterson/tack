<!DOCTYPE html>
<html>
<head><title>tack assets</title>
<style>

.row { display: flex; gap: 40px; align-items: center; }

  <div class="preview"><img src="icon.svg" width="128" height="128"><p>32×32 @ 4x</p></div>
</div>
<div class="preview"><img src="hero.svg" width="800" height="240"><p>hero (800×240)</p></div>
