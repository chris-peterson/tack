<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 240" width="800" height="240" role="img" aria-label="tack — route tracker for AI-assisted development">
  <defs>
    <linearGradient id="beat" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#bd93f9"/>
      <stop offset="55%" stop-color="#8be9fd"/>
      <stop offset="100%" stop-color="#50fa7b"/>
    </linearGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0.4" y2="1">
      <stop offset="0%" stop-color="#282a36"/>
      <stop offset="100%" stop-color="#1c1d26"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#50fa7b" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#50fa7b" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="frame">
      <rect width="800" height="240" rx="16"/>
    </clipPath>
  </defs>

  <rect width="800" height="240" rx="16" fill="url(#bg)"/>

  <g clip-path="url(#frame)">
    <!-- Destination glow -->
    <circle cx="708" cy="42" r="42" fill="url(#glow)"/>

    <!-- The route: a tacking beat arcing up and to the right -->
    <path d="M 66 196 L 156 150 L 132 126 L 250 108 L 226 84 L 360 78 L 470 62 L 590 52 L 708 42"
          fill="none" stroke="url(#beat)" stroke-width="3.5"
          stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Origin -->
    <circle cx="66" cy="196" r="6.5" fill="#bd93f9"/>
    <circle cx="66" cy="196" r="11" fill="none" stroke="#bd93f9" stroke-width="1" opacity="0.35"/>

    <!-- Destination: the shipped deliverable -->
    <circle cx="708" cy="42" r="7" fill="#50fa7b"/>
    <circle cx="708" cy="42" r="12" fill="none" stroke="#50fa7b" stroke-width="1" opacity="0.4"/>

    <!-- Wordmark, anchored in the open lower-right -->
    <text x="748" y="198" text-anchor="end"
          font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', ui-monospace, monospace"
          font-size="34" font-weight="600" fill="#f8f8f2" letter-spacing="7">tack</text>
    <text x="748" y="220" text-anchor="end"
          font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', ui-monospace, monospace"
          font-size="10.5" fill="#6272a4" letter-spacing="2.5">route tracker · ai-assisted development</text>
  </g>
</svg>
