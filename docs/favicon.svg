    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Origin point -->
  <circle cx="10" cy="54" r="4" fill="#bd93f9"/>

  <!-- Destination point -->
  <circle cx="54" cy="10" r="4" fill="#50fa7b"/>

  <!-- Waypoint dots -->
  <circle cx="20" cy="40" r="2.5" fill="#8be9fd" opacity="0.5"/>
  <circle cx="14" cy="30" r="2.5" fill="#8be9fd" opacity="0.5"/>
  <circle cx="28" cy="22" r="2.5" fill="#8be9fd" opacity="0.5"/>
  <circle cx="22" cy="14" r="2.5" fill="#8be9fd" opacity="0.5"/>
  <circle cx="36" cy="8" r="2.5" fill="#8be9fd" opacity="0.5"/>
</svg>
