<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="tack">
  <defs>
    <linearGradient id="beat" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#bd93f9"/>
      <stop offset="55%" stop-color="#8be9fd"/>
      <stop offset="100%" stop-color="#50fa7b"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#50fa7b" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#50fa7b" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="#282a36"/>

