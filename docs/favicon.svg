<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="route-grad" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#6272a4"/>
      <stop offset="100%" stop-color="#8be9fd"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="#282a36"/>

  <!-- Tacking route path (scaled from assets/icon.svg 32→64) -->
