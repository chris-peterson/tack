name: Build
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ts:
    name: TypeScript build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: implementations/v1/1-typescript
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: implementations/v1/1-typescript/package-lock.json

      - run: npm ci
      - run: npm run build
      - run: npm test
