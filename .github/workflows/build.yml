name: Build
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  ts:
    name: TypeScript build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v5
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: npm test
