name: Deploy docs

# Delegates to shipyard's reusable docs deploy (float to @actions during
# consolidation). Pages permissions are granted here because reusable-workflow
# permissions are capped by the caller's token.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  pages: write
  id-token: write

jobs:
  deploy:
    uses: chris-peterson/shipyard/.github/workflows/deploy-docs.yml@main
